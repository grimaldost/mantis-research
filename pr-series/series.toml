# Series — Agent-researcher pivot + review remediations
#
# Decompose + Route/Budget deliverable for docs/specs/0001-agent-researcher-pivot.md.
# Each PR cites exactly one numbered spec section (the §↔PR bijection); that
# section IS the PR prompt — self-contained, with an acceptance criterion and
# code anchors. Tiers are the complexity score → model tier
# (pr-pilot:model-tiers): weak 0-25, mid 26-55, strong 56-100.
#
# Execution note: this wave is implemented IN-SESSION (the series table as the
# manual checklist per method-bindings), not fired through the pr-pilot engine.
# The `tier` column records the routing decision and the cost forecast; the
# gate discipline (ruff format --check / ruff check / ty / pytest / purity) and
# the blocking review against docs/method/review-checklist.md apply per PR
# regardless of who implements.

[series]
id = "agent-researcher-pivot"
integration_branch = "master"
spec = "docs/specs/0001-agent-researcher-pivot.md"

# ── Wave 1 — independent foundations (no cross-deps; land in any order) ──
[[pr]]
id = "PR01"
section = "§1"
tier = "weak"
concern = "Docs-truth baseline + CHANGELOG bootstrap; delete stale prompt docs"

[[pr]]
id = "PR02"
section = "§2"
tier = "weak"
concern = "Rate-limit classification: drop bare 'resets' pattern + regression test"

[[pr]]
id = "PR03"
section = "§3"
tier = "weak"
concern = "Status semantics: delete is_terminal + its test; document cross-run rule"

[[pr]]
id = "PR04"
section = "§4"
tier = "mid"
concern = "topic_stem helper; replace 8 int(topic_id) sites across 6 stages"

[[pr]]
id = "PR05"
section = "§5"
tier = "mid"
concern = "Stage-owned preflight joins the Stage Protocol; dispatch stops touching _adapter"

[[pr]]
id = "PR07"
section = "§7"
tier = "mid"
concern = "Core-purity AST gate + pre-commit wiring (I1 becomes a machine check)"

# ── Wave 2 — the typed-context refactor everything else builds on ──
[[pr]]
id = "PR06"
section = "§6"
tier = "strong"
concern = "Typed stage context: RunContext.batch + run_attempt(TopicConfig); translation invariant"
depends_on = ["PR01", "PR02", "PR03", "PR04", "PR05", "PR07"]  # soft: land the cheap foundations first

# ── Wave 3 — config-schema + stage features (on PR06) ──
[[pr]]
id = "PR08"
section = "§8"
tier = "mid"
concern = "Journal turn honors stages.journal.enabled + config-corpus gate (I4)"
depends_on = ["PR06"]

[[pr]]
id = "PR09"
section = "§9"
tier = "mid"
concern = "Primary-brief selection in config (Path B native); deprecate promote script"
depends_on = ["PR06", "PR08"]

[[pr]]
id = "PR10"
section = "§10"
tier = "mid"
concern = "research_prompt templating; presence-not-truthiness resolution (163-topic fix)"
depends_on = ["PR06", "PR08"]  # PR08 gate must exist first (empty-prompt corpus)

[[pr]]
id = "PR11"
section = "§11"
tier = "mid"
concern = "Batch-scoped layout resolvers + runner.layout field + orchestrator wiring"
depends_on = ["PR06"]

[[pr]]
id = "PR12"
section = "§12"
tier = "mid"
concern = "OpenRouter usage/cost persistence + golden-file state test (I4)"
depends_on = ["PR06"]

[[pr]]
id = "PR13"
section = "§13"
tier = "mid"
concern = "Sidecar schema v1 (pure pydantic module; two authorship zones)"
depends_on = ["PR06"]

# ── Wave 4 — sidecar emission + packaged stages (on PR12/PR13) ──
[[pr]]
id = "PR14"
section = "§14"
tier = "strong"
concern = "Sidecar emission: structured output, bounded sub-loop, idempotent re-entry, merge"
depends_on = ["PR12", "PR13"]

[[pr]]
id = "PR15"
section = "§15"
tier = "mid"
concern = "Evaluation + claude-prior stages join the package + subcommands"
depends_on = ["PR06"]

# ── Wave 5 — dispatch seam + reporting (on PR11) ──
[[pr]]
id = "PR18"
section = "§18"
tier = "mid"
concern = "Layout-aware dispatch + dispatch_stage_config in-memory seam; guards into seam"
depends_on = ["PR06", "PR11"]

[[pr]]
id = "PR19"
section = "§19"
tier = "mid"
concern = "Layout-aware status + monitor (--batch-name/--layout)"
depends_on = ["PR11"]

# ── Wave 6 — request-level entry (on the seam + emission + stages) ──
[[pr]]
id = "PR16"
section = "§16"
tier = "strong"
concern = "mantis research one-shot command + assurance tiers + manifest"
depends_on = ["PR09", "PR10", "PR14", "PR15", "PR18"]

# ── Wave 7 — positioning docs (last; describes the shipped surface) ──
[[pr]]
id = "PR17"
section = "§17"
tier = "weak"
concern = "README rewrite + CLAUDE.md refresh; drop the abandoned Phase-4 rename note"
depends_on = ["PR14", "PR15", "PR16", "PR18", "PR19"]

# ── Wave budget (Upgrade 4) — forecast + drift gate ─────────────────────
# Per-PR forecasts scale the pr-pilot:model-tiers small-prompt baselines up for
# the large spec-section prompts and (for strong PRs) heavy refactor output.
# impl+review+fix, rough:
#   weak  x4  (PR01/02/03/17)                ~ $0.10 each  = $0.40
#   mid   x12 (PR04/05/07/08/09/10/11/12/13/15/18/19) ~ $0.45 each = $5.40
#   strong x3 (PR06/14/16)                   ~ $2.50 each  = $7.50
[budget]
estimate_usd = 13.30
all_opus_baseline_usd = 30.00   # every PR at strong tier (~$1.58 avg all-in)
drift_threshold = 0.30
on_breach = "warn"
